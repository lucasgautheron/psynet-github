name: Deploy hotair debug experiment

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "{{default_branch}}"
        type: string
      region:
        description: "AWS region"
        required: true
        default: "us-east-1"
        type: string
      instance_type:
        description: "EC2 instance type"
        required: true
        default: "m7i.xlarge"
        type: string
      memory_gb:
        description: "Provisioned disk/memory size in GB passed to Dallinger"
        required: true
        default: "32"
        type: string
      server_name:
        description: "Dallinger EC2 server name"
        required: true
        default: "{{repo_name}}-debug"
        type: string
      app_name:
        description: "PsyNet debug app name"
        required: true
        default: "{{repo_name}}-debug"
        type: string
      dns_host:
        description: "DNS host for the debug server"
        required: true
        default: "{{repo_name}}-debug.example.com"
        type: string
      ssh_key_name:
        description: "Dallinger EC2 SSH key name"
        required: true
        default: "psynet-github-deploy"
        type: string

permissions:
  contents: read

concurrency:
  group: hotair-debug-${{ inputs.server_name }}-${{ inputs.app_name }}
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || vars.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || vars.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN || vars.AWS_SESSION_TOKEN }}
  AWS_DEFAULT_REGION: ${{ inputs.region }}
  AWS_REGION: ${{ inputs.region }}

jobs:
  deploy:
    name: Provision and start hotair debug run
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements.txt
            constraints.txt

      - name: Install experiment dependencies
        run: |
          set -euo pipefail

          uv venv --python 3.13 .venv
          source .venv/bin/activate

          if [ -f requirements.txt ] && [ -f constraints.txt ]; then
            uv pip install -r requirements.txt -c constraints.txt
          elif [ -f requirements.txt ]; then
            uv pip install -r requirements.txt
          elif [ -f constraints.txt ]; then
            uv pip install -r constraints.txt
          else
            echo "Missing requirements.txt or constraints.txt." >&2
            exit 1
          fi

          command -v dallinger >/dev/null
          command -v psynet >/dev/null

      - name: Configure Dallinger and AWS environment
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          DASHBOARD_USER: ${{ secrets.DALLINGER_DASHBOARD_USER || vars.DALLINGER_DASHBOARD_USER }}
          DASHBOARD_PASSWORD: ${{ secrets.DALLINGER_DASHBOARD_PASSWORD || vars.DALLINGER_DASHBOARD_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "Missing AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY GitHub secrets." >&2
            exit 1
          fi
          if [ -z "${DASHBOARD_USER:-}" ] || [ -z "${DASHBOARD_PASSWORD:-}" ]; then
            echo "Missing DALLINGER_DASHBOARD_USER or DALLINGER_DASHBOARD_PASSWORD GitHub secrets/variables." >&2
            exit 1
          fi

          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"

          if [ -n "${EC2_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "${EC2_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/${{ inputs.ssh_key_name }}.pem"
            chmod 600 "${HOME}/.ssh/${{ inputs.ssh_key_name }}.pem"
          else
            echo "EC2_SSH_PRIVATE_KEY is not set; dallinger ec2 provision may fail if the key is not already available."
          fi

          touch "${HOME}/.ssh/known_hosts"

          cat > "${HOME}/.dallingerconfig" <<EOF
          [Parameters]
          aws_region = ${{ inputs.region }}
          ec2_default_pem = ${{ inputs.ssh_key_name }}
          server_pem = ~/.ssh/${{ inputs.ssh_key_name }}.pem
          dashboard_user = ${DASHBOARD_USER}
          dashboard_password = ${DASHBOARD_PASSWORD}
          EOF

      - name: Validate deployment inputs
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          import sys

          patterns = {
              "region": r"[a-z]{2}-[a-z]+-\d",
              "instance_type": r"[a-z0-9]+\.[a-z0-9]+",
              "memory_gb": r"[1-9][0-9]{0,3}",
              "server_name": r"[a-z0-9][a-z0-9-]{1,61}[a-z0-9]",
              "app_name": r"[a-z0-9][a-z0-9-]{1,61}[a-z0-9]",
              "dns_host": r"[A-Za-z0-9][A-Za-z0-9.-]{1,253}[A-Za-z0-9]",
              "ssh_key_name": r"[A-Za-z0-9._-]{1,255}",
          }
          values = {
              "region": "${{ inputs.region }}",
              "instance_type": "${{ inputs.instance_type }}",
              "memory_gb": "${{ inputs.memory_gb }}",
              "server_name": "${{ inputs.server_name }}",
              "app_name": "${{ inputs.app_name }}",
              "dns_host": "${{ inputs.dns_host }}",
              "ssh_key_name": "${{ inputs.ssh_key_name }}",
          }
          for key, pattern in patterns.items():
              if not re.fullmatch(pattern, values[key]):
                  print(f"Invalid {key}: {values[key]}", file=sys.stderr)
                  sys.exit(2)
          PY

      - name: Check whether EC2 server exists
        id: server
        run: |
          set -euo pipefail
          source .venv/bin/activate

          dallinger ec2 list instances --all --region "${{ inputs.region }}" > ec2-instances.txt

          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          from pathlib import Path

          server_name = "${{ inputs.server_name }}"
          listing = Path("ec2-instances.txt").read_text(encoding="utf-8", errors="replace")
          exists = server_name in listing
          print(f"exists={'true' if exists else 'false'}")
          PY

      - name: Provision EC2 server if needed
        if: ${{ steps.server.outputs.exists != 'true' }}
        run: |
          set -euo pipefail
          source .venv/bin/activate

          dallinger ec2 provision \
            --name "${{ inputs.server_name }}" \
            --region "${{ inputs.region }}" \
            --dns-host "${{ inputs.dns_host }}" \
            --type "${{ inputs.instance_type }}" \
            --storage "${{ inputs.memory_gb }}"

      - name: Stop existing debug run if present
        run: |
          set -euo pipefail
          source .venv/bin/activate

          set +e
          psynet destroy ssh \
            --app "${{ inputs.app_name }}" \
            --server "${{ inputs.dns_host }}"
          status=$?
          set -e

          if [ "${status}" -eq 0 ]; then
            echo "Stopped existing debug app '${{ inputs.app_name }}'."
          else
            echo "No existing debug app '${{ inputs.app_name }}' was destroyed, or destroy reported a non-fatal failure."
          fi

      - name: Start hotair debug run
        run: |
          set -euo pipefail
          source .venv/bin/activate

          psynet debug ssh \
            --app "${{ inputs.app_name }}" \
            --dns-host "${{ inputs.dns_host }}" \
            --server "${{ inputs.dns_host }}" \
            --recruiter hotair

      - name: Write deployment summary
        if: ${{ always() }}
        run: |
          {
            echo "## Hotair debug deployment"
            echo
            echo "- Ref: ${{ inputs.deploy_ref }}"
            echo "- App: ${{ inputs.app_name }}"
            echo "- Server name: ${{ inputs.server_name }}"
            echo "- DNS host: ${{ inputs.dns_host }}"
            echo "- Region: ${{ inputs.region }}"
            echo "- Instance type: ${{ inputs.instance_type }}"
            echo "- Memory/storage GB: ${{ inputs.memory_gb }}"
            echo
            echo "Participant URL:"
            echo
            echo "https://${{ inputs.dns_host }}/ad?generate_tokens=true&recruiter=hotair&mode=debug"
            echo
            echo "Stop command:"
            echo
            echo "\`psynet destroy ssh --app \"${{ inputs.app_name }}\" --server \"${{ inputs.dns_host }}\"\`"
          } >> "${GITHUB_STEP_SUMMARY}"
